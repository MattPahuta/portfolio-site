<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matt Pahuta Frontend Engineer</title>
  <!-- Add Fontawesome CDN -->
  <!-- Add Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <!-- Sticky navbar | Hamburger menu on mobile -->
      <nav>
        <button id="mobile-nav-toggle" class="mobile-nav-toggle" aria-controls="primary-navigation" aria-expanded="false" aria-label="navigation menu">
          <span class="sr-only">Menu</span>
        </button>
        <ul class="nav-list">
          <li class="nav-list__item">Home</li>
          <li class="nav-list__item">About</li>
          <li class="nav-list__item">Skills</li>
          <li class="nav-list__item">Projects</li>
          <li class="nav-list__item">Contact</li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="intro" id="home">
        <h1 class="section__title intro-title">
          <span class="accent">Hi there,</span> 
          <span class="title block">I'm Matt Pahuta.</span>
        </h1>
        <p>Frontend Developer.</p>
        <img class="intro__image" src="./assets/profile-square.webp" alt="Stylized image of Matt Pahuta">
      </section>

      <!-- About Section -->
      <section class="about" id="about"></section>

      <!-- Skills Section -->
      <section class="skills" id="skills"></section>

      <!-- Projects Sections -->
      <section class="projects" id="projects">
        <div class="projects-grid"></div>
      </section>

      <!-- Contact Section -->
      <section class="contact" id="contact">

      </section>
    </div>
  </main>
  <footer>
    <div class="container">
      <div class="copy-container">
        <span>Matt Pahuta | 2023</span>
      </div>
    </div>
  </footer>
  
  <!-- Custom JavaScript -->
  <script src="./js/main.js"></script>
</body>
</html>
